{% extends 'layout.html' %} {% block content %}
<h1>Login</h1>
<form action="/login.html" method="POST" class="box">
  <div>
    <label class="form-label">Email address</label>
    <input
      name="email"
      type="email"
      class="form-control"
      id="email"
      pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2, 4}$"
      placeholder="name@example.com"
      required
    />
  </div>
  <div>
    <label class="form-label">Password</label>
    <input
      class="form-control"
      type="password"
      name="password"
      id="password"
      required
    ></input>
  </div>
  <br />

  <p style="margin:1rem">Don't have an account?</p>
  <a href="{{ url_for('signup') }}">Signup</a>

  <div>
    <button type="submit" class="btn" style="margin:1rem">Submit</button>
  </div>
</form>

{{ message }}
{% endblock %}
