{% extends 'layout.html' %} {% block content %}
<style>
  body {
    font-family: "Nunito", sans-serif;
    font-size: 2rem;
  }
  h2 {
    font-size: 5rem;
    color: #3ebbc7;
  }
</style>

<!-- BANNER -->
<div class="banner-container">
  <img
    src="static/images/hololive-super-expo-2023.jpg"
    alt="Hololive Image"
    class="banner-image"
  />
  <div class="banner-content">
    <h1>Hololive</h1>
    <p>Explore your favourite virtual idols</p>
  </div>
</div>

<!-- ABOUT SECTION -->
<div class="main-container">
  <div class="text-image-container">
    <div class="text-container">
      <h2>About</h2>
      <p>Explore the endless fun within the world of Hololive!</p>
    </div>
    <img
      src="https://dzt1km7tv28ex.cloudfront.net/static/shop/special/hololive_meet2024/hero_mobile_v2.jpg"
      alt="Hololive image"
      class="image-container"
    />
  </div>
  <a href="about.html">
    <button class="button-container">View More</button>
  </a>
</div>

<!-- MIDDLE BANNER -->
<div class="image-row">
  <img
    src="https://hololivepro.com/wp-content/uploads/2023/03/about_main05.png"
    alt="Hololive Image"
    class="mid-image-container"
  />
</div>

<!-- TALENTS SECTION -->
<div class="main-container">
  <div class="text-image-container">
    <img
      src="https://static.wikia.nocookie.net/jpop/images/8/86/Hololive_production.jpg/revision/latest?cb=20211220121755"
      alt="Hololive Talents Image"
      class="image-container"
    />
    <div class="text-container">
      <h2>Talents</h2>
      <p>Explore who Hololive has to offer!</p>
    </div>
  </div>
  <a href="index.html">
    <button class="button-container">View More</button>
  </a>
</div>
{% endblock %}
